name: E2E Tenant Flow

on:
  pull_request:
    paths:
      - 'app/pbv-full-app/**'
      - 'app/api/t/**'
      - 'components/pbv/**'
      - 'components/review/StantonReviewSurface.tsx'
      - 'lib/pbv/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'
  push:
    branches: [main]
    paths:
      - 'app/pbv-full-app/**'
      - 'app/api/t/**'
      - 'components/pbv/**'
      - 'components/review/StantonReviewSurface.tsx'
      - 'lib/pbv/**'
      - 'tests/e2e/**'
      - 'playwright.config.ts'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Playwright)
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
          TEST_BASE_URL: ${{ vars.TEST_BASE_URL || 'http://localhost:3000' }}

      - name: Run package integrity tests (Vitest)
        run: npx vitest run tests/e2e/pbv-form-execution-package-integrity.spec.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload submission package snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pbv-submission-package-snapshot
          path: tests/snapshots/pbv-form-execution-maria-package/
          retention-days: 30
